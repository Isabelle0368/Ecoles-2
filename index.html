<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche d'écoles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .search-container {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        input, button, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            max-width: 400px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            padding: 8px 15px;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .result-container {
            margin-top: 20px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Recherche d'écoles</h1>

    <!-- Section pour rechercher une école par nom -->
    <div class="search-container">
        <h2>Rechercher une école par nom</h2>
        <input type="text" id="schoolName" placeholder="Nom de l'école">
        <button onclick="searchSchoolByName()">Rechercher</button>
        <div id="schoolResult" class="result-container"></div>
    </div>

    <!-- Section pour filtrer les écoles par circonscription -->
    <div class="search-container">
        <h2>Lister les écoles d'une circonscription</h2>
        <select id="filterCirconscription" onchange="listSchoolsByCirconscription()">
            <option value="">-- Sélectionnez une circonscription --</option>
        </select>
        <div id="circonscriptionResult" class="result-container"></div>
    </div>

    <!-- Section pour filtrer les écoles par commune -->
    <div class="search-container">
        <h2>Lister les écoles d'une commune</h2>
        <select id="filterCommune" onchange="listSchoolsByCommune()">
            <option value="">-- Sélectionnez une commune --</option>
        </select>
        <div id="communeResult" class="result-container"></div>
    </div>

    <script>
        // Variable globale pour stocker les données JSON
        let schoolsData = [];

        // Charger le fichier JSON
        function loadJSON() {
            fetch('ecoles.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erreur lors du chargement du fichier JSON');
                    }
                    return response.json();
                })
                .then(data => {
                    schoolsData = data;
                    console.log('Données chargées avec succès !', schoolsData);

                    // Remplir les listes déroulantes pour les filtres
                    fillFilterOptions();
                })
                .catch(error => {
                    console.error('Erreur lors du chargement du fichier JSON :', error);
                    document.body.innerHTML = `<p style="color:red;">Erreur lors du chargement des données. Vérifiez la console pour plus de détails.</p>`;
                });
        }

        // Remplir les options des listes déroulantes pour les filtres
        function fillFilterOptions() {
            // Extraire les circonscriptions uniques
            const circonscriptions = [...new Set(schoolsData.map(school => school['Circonscription']))]
                .filter(circonscription => circonscription)
                .sort();

            // Extraire les communes uniques
            const communes = [...new Set(schoolsData.map(school => school['Commune']))]
                .filter(commune => commune)
                .sort();

            // Remplir la liste déroulante des circonscriptions
            const filterCirconscription = document.getElementById('filterCirconscription');
            circonscriptions.forEach(circonscription => {
                const option = document.createElement('option');
                option.value = circonscription;
                option.textContent = circonscription;
                filterCirconscription.appendChild(option);
            });

            // Remplir la liste déroulante des communes
            const filterCommune = document.getElementById('filterCommune');
            communes.forEach(commune => {
                const option = document.createElement('option');
                option.value = commune;
                option.textContent = commune;
                filterCommune.appendChild(option);
            });
        }

        // Rechercher une école par nom
        function searchSchoolByName() {
            const schoolName = document.getElementById('schoolName').value.trim().toLowerCase();
            const resultDiv = document.getElementById('schoolResult');

            if (!schoolName) {
                resultDiv.innerHTML = '<p>Veuillez entrer un nom d\'école.</p>';
                return;
            }

            const results = schoolsData.filter(school =>
                school['Nom de l\'école'] && school['Nom de l\'école'].toLowerCase().includes(schoolName)
            );

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée avec ce nom.</p>';
            } else {
                displaySchools(results, resultDiv);
            }
        }

        // Lister les écoles d'une circonscription
        function listSchoolsByCirconscription() {
            const circonscription = document.getElementById('filterCirconscription').value;
            const resultDiv = document.getElementById('circonscriptionResult');

            if (!circonscription) {
                resultDiv.innerHTML = '';
                return;
            }

            const results = schoolsData.filter(school => school['Circonscription'] === circonscription);

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée pour cette circonscription.</p>';
            } else {
                displaySchools(results, resultDiv);
            }
        }

        // Lister les écoles d'une commune
        function listSchoolsByCommune() {
            const commune = document.getElementById('filterCommune').value;
            const resultDiv = document.getElementById('communeResult');

            if (!commune) {
                resultDiv.innerHTML = '';
                return;
            }

            const results = schoolsData.filter(school => school['Commune'] === commune);

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée pour cette commune.</p>';
            } else {
                displaySchools(results, resultDiv);
            }
        }

        // Afficher les écoles dans un tableau
        function displaySchools(data, resultDiv) {
            if (data.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée.</p>';
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Nom de l'école</th>
                            <th>Circonscription</th>
                            <th>Commune</th>
                            <th>Adresse</th>
                            <th>Téléphone</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(school => {
                tableHTML += `
                    <tr>
                        <td>${school['Nom de l\'école'] || 'N/A'}</td>
                        <td>${school['Circonscription'] || 'N/A'}</td>
                        <td>${school['Commune'] || 'N/A'}</td>
                        <td>${school['Adresse'] || 'N/A'}</td>
                        <td>${school['Téléphone'] || 'N/A'}</td>
                        <td>${school['Mail'] || 'N/A'}</td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            resultDiv.innerHTML = tableHTML;
        }

        // Charger le JSON au démarrage
        window.onload = loadJSON;
    </script>
</body>
</html>
